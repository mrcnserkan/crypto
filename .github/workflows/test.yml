name: Test

on:
  push:
    branches: [master, main, "feature/**", "release/**"]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run tests
        run: go test ./... -race -cover

      - name: Build
        run: go build -o crypto .
